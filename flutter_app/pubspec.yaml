name: urdu_learning_app
description: AI-Powered Urdu Learning Mobile App — FYP
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.1
  http: ^1.2.0
  flutter_tts: ^3.8.5
  speech_to_text: ^6.6.0
  shared_preferences: ^2.2.2
  permission_handler: ^11.0.1
  lottie: ^2.7.0
  google_fonts: ^6.1.0
  record: ^5.0.4
  path_provider: ^2.1.1
  audioplayers: ^5.2.1
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf
          weight: 400

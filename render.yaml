# render.yaml — Urdu Learning App backend deployment
# Deploy to Render.com with one click:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect your repo — Render reads this file automatically

services:
  - type: web
    name: urdu-learning-api
    env: python
    region: oregon
    plan: free          # upgrade to "starter" for always-on + more RAM
    buildCommand: pip install --no-cache-dir -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health

    envVars:
      # ── Database ─────────────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: urdu-learning-db
          property: connectionString

      # ── HuggingFace model cache ──────────────────────────────────────────
      - key: TRANSFORMERS_CACHE
        value: /opt/render/project/.cache/huggingface
      - key: HF_HOME
        value: /opt/render/project/.cache/huggingface

      # ── Optional: your fine-tuned model IDs on HuggingFace Hub ──────────
      # Uncomment and set these after running ml/train_asr.py --push_to_hub
      # - key: ASR_MODEL_ID
      #   value: YOUR_HF_USERNAME/urdu-asr-whisper
      # - key: PRON_MODEL_ID
      #   value: YOUR_HF_USERNAME/urdu-pronunciation
      # - key: GRAMMAR_MODEL_ID
      #   value: YOUR_HF_USERNAME/urdu-grammar-mt5

      # ── CORS allowed origins (add your Flutter web domain if needed) ─────
      - key: ALLOWED_ORIGINS
        value: "*"

    # Auto-deploy on every push to main branch
    autoDeploy: true

    # Render free tier sleeps after 15 min of inactivity.
    # The Flutter app handles the cold-start delay gracefully via
    # ApiService timeout + offline Levenshtein fallback.

# ── PostgreSQL database ────────────────────────────────────────────────────────
databases:
  - name: urdu-learning-db
    databaseName: urdu_learning
    user: urdu_admin
    plan: free          # 1 GB storage, 256 MB RAM (free tier)
    region: oregon

# ── Notes ─────────────────────────────────────────────────────────────────────
# Free tier limitations:
#   Web service  — spins down after 15 min idle, 512 MB RAMpip install transformers jiwer sacrebleu
#   Database     — 1 GB storage, 90-day retention on free plan
#
# Recommended upgrade path for production:
#   Web: Starter ($7/mo) — always-on, 512 MB RAM
#   DB:  Starter ($7/mo) — persistent storage, daily backups
#
# Alternatively deploy with Docker:
#   docker build -t urdu-learning-api .
#   docker run -p 8000:8000 -e DATABASE_URL=<url> urdu-learning-api
